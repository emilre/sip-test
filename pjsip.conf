; ===========================================
; PJSIP Transport
; ===========================================
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0

; ===========================================
; Extension 100 — "Phone A"
; ===========================================
[100]
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
auth=100-auth
aors=100
callerid="Phone A" <100>

[100-auth]
type=auth
auth_type=userpass
username=100
password=phone100pass

[100]
type=aor
max_contacts=1

; ===========================================
; Extension 101 — "Phone B"
; ===========================================
[101]
type=endpoint
context=internal
disallow=all
allow=ulaw
allow=alaw
allow=opus
auth=101-auth
aors=101
callerid="Phone B" <101>

[101-auth]
type=auth
auth_type=userpass
username=101
password=phone101pass

[101]
type=aor
max_contacts=1

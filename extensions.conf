[general]
static=yes
writeprotect=no

[globals]
WEBHOOK_URL=http://127.0.0.1:8090

; =============================================
; Hangup handler — fires on every hangup
; =============================================
[hangup-handler]
exten => s,1,NoOp(Hangup handler triggered)
 same => n,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"hangup","call_id":"${UNIQUEID}","channel":"${CHANNEL}","caller":"${CALLERID(num)}","callee":"${CALLED_EXTEN}","cause":"${HANGUPCAUSE}","duration":"${CDR(duration)}","billsec":"${CDR(billsec)}","hangup_by":"${CHANNEL(hangupsource)}"}')
 same => n,Return()

; =============================================
; Tracked internal calls
; =============================================
[internal]
; --- Extension 100 ---
exten => 100,1,Set(CALLED_EXTEN=100)
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same => n,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"dial_start","call_id":"${UNIQUEID}","channel":"${CHANNEL}","caller":"${CALLERID(num)}","callee":"100"}')
 same => n,Dial(PJSIP/100,20,U(on-answer))
 same => n,Set(DIAL_RESULT=${DIALSTATUS})
 same => n,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"dial_result","call_id":"${UNIQUEID}","caller":"${CALLERID(num)}","callee":"100","result":"${DIAL_RESULT}"}')
 same => n,Hangup()

; --- Extension 101 ---
exten => 101,1,Set(CALLED_EXTEN=101)
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same => n,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"dial_start","call_id":"${UNIQUEID}","channel":"${CHANNEL}","caller":"${CALLERID(num)}","callee":"101"}')
 same => n,Dial(PJSIP/101,20,U(on-answer))
 same => n,Set(DIAL_RESULT=${DIALSTATUS})
 same => n,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"dial_result","call_id":"${UNIQUEID}","caller":"${CALLERID(num)}","callee":"101","result":"${DIAL_RESULT}"}')
 same => n,Hangup()

; --- Extension 600 — Tracked test call (loopback, plays audio) ---
exten => 600,1,Set(CALLED_EXTEN=600)
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same => n,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"ringing","call_id":"${UNIQUEID}","channel":"${CHANNEL}","caller":"${CALLERID(num)}","callee":"600"}')
 same => n,Answer()
 same => n,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"answered","call_id":"${UNIQUEID}","channel":"${CHANNEL}","caller":"${CALLERID(num)}","callee":"600"}')
 same => n,Playback(hello-world)
 same => n,Playback(tt-weasels)
 same => n,Hangup()

; --- Subroutine: called when callee answers ---
[on-answer]
exten => s,1,System(curl -s -X POST -H "Content-Type: application/json" ${WEBHOOK_URL} -d '{"event":"answered","call_id":"${UNIQUEID}","channel":"${CHANNEL}","caller":"${CALLERID(num)}","answered_by":"${CONNECTEDLINE(num)}"}')
 same => n,Return()

; =============================================
; Demo extensions (unchanged)
; =============================================
exten => 200,1,Answer()
 same => n,Wait(1)
 same => n,Playback(hello-world)
 same => n,Playback(tt-weasels)
 same => n,Hangup()

exten => 300,1,Answer()
 same => n,Wait(1)
 same => n,Background(press-1&or&press-2)
 same => n,WaitExten(5)

exten => 1,1,Playback(you-entered)
 same => n,SayNumber(1)
 same => n,Hangup()

exten => 2,1,Playback(you-entered)
 same => n,SayNumber(2)
 same => n,Hangup()

exten => i,1,Playback(invalid)
 same => n,Goto(300,1)

exten => t,1,Playback(goodbye)
 same => n,Hangup()

exten => 400,1,Answer()
 same => n,Echo()
 same => n,Hangup()

exten => 500,1,Answer()
 same => n,Wait(1)
 same => n,Playback(custom-test)
 same => n,Hangup()

; =============================================
; Load test contexts (unchanged)
; =============================================
[test-loopback]
exten => s,1,Answer()
 same => n,Playback(demo-instruct&demo-instruct&demo-instruct)
 same => n,Hangup()

[test-originate]
exten => _X.,1,Dial(Local/s@test-loopback)
 same => n,Hangup()

[load-test]
exten => _X.,1,Answer()
 same => n,Set(CHANNEL(audioreadformat)=ulaw)
 same => n,Set(CHANNEL(audiowriteformat)=ulaw)
 same => n,Playback(demo-instruct&demo-instruct&demo-instruct)
 same => n,Hangup()
